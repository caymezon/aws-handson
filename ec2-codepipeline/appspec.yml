version: 0.0
os: linux

files:
  - source: webapp.war
    destination: /opt/tomcat/current/webapps
    overwrite: yes

permissions:
  - object: /opt/tomcat/current/webapps/webapp.war
    owner: tomcat
    group: tomcat
    mode: 644

hooks:
  BeforeInstall:
    - location: scripts/stop_server.sh
      timeout: 60
      runas: root
  AfterInstall:
    - location: scripts/start_server.sh
      timeout: 120
      runas: root
  ValidateService:
    - location: scripts/validate_service.sh
      timeout: 60
      runas: root
